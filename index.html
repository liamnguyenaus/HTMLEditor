<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plain Writing ↔ HTML Editor</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      padding: 16px;
      background: #f6f7f9;
      font-family: system-ui, Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      color: #999;
      letter-spacing: 0.5px;
    }

    #editor, #htmlBox {
      flex: 1;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      overflow-y: auto;
    }

    #htmlBox {
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
      color: #000;
      white-space: pre-wrap;
    }

    .toolbar {
      display: flex;
      gap: 4px;
    }

    .btn {
      padding: 4px 8px;
      font-size: 12px;
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn:hover {
      background: #e0e0e0;
    }

    /* Push Button Styling */
    .push-btn {
      background: #80397B;
      color: white;
      border: none;
      font-weight: bold;
    }

    .push-btn:hover {
      background: #5c2d58;
    }
  </style>
</head>
<body>
  <h1>
    Editor
    <button class="btn push-btn" id="pushBtn">Push to Page</button>
  </h1>

  <div class="grid">
    <div class="panel">
      <header>
        <span class="label">Rich Text</span>
        <div class="toolbar">
          <button class="btn" onclick="cmd('bold')">B</button>
          <button class="btn" onclick="cmd('italic')">I</button>
          <button class="btn" onclick="insertLink()">Link</button>
        </div>
      </header>
      <div id="editor" contenteditable="true"><p></p></div>
    </div>

    <div class="panel">
      <header><span class="label">HTML Source</span></header>
      <textarea id="htmlBox" oninput="syncFromHtml()" spellcheck="false"></textarea>
    </div>
  </div>

  <script>
    const editor = document.getElementById("editor");
    const htmlBox = document.getElementById("htmlBox");
    let syncing = false;

    // Initialize Office Add-in
    Office.onReady((info) => {
      if (info.host === Office.HostType.OneNote) {
        document.getElementById("pushBtn").onclick = pushContent;
      }
    });

    async function pushContent() {
      const content = editor.innerHTML;
      try {
        await OneNote.run(async (context) => {
          const page = context.application.getActivePage();
          page.outlineContents.insertHtml(0, content);
          await context.sync();
        });
      } catch (error) {
        console.error("Error pushing to OneNote:", error);
      }
    }

    function tidy(html) {
      html = html
        .replace(/<div>/gi, "")
        .replace(/<\/div>/gi, "<br>")
        .replace(/<p><br><\/p>/gi, "<br>")
        .replace(/<\/p><p>/gi, "<br>")
        .replace(/<p>/gi, "")
        .replace(/<\/p>/gi, "<br>");

      const temp = document.createElement("div");
      temp.innerHTML = html;
      html = temp.innerHTML;

      html = html
        .replace(/<br>\s*<br>/gi, "<br>\n")
        .replace(/<br>/gi, "<br>\n");

      return html.trim();
    }

    function syncFromEditor() {
      if (syncing) return;
      syncing = true;
      htmlBox.value = tidy(editor.innerHTML);
      syncing = false;
    }

    function syncFromHtml() {
      if (syncing) return;
      syncing = true;
      editor.innerHTML = htmlBox.value || "<p></p>";
      syncing = false;
    }

    function cmd(c) {
      editor.focus();
      document.execCommand(c, false, null);
      syncFromEditor();
    }

    function insertLink() {
      editor.focus();
      const url = prompt("Enter URL");
      if (!url) return;
      document.execCommand("createLink", false, url);
      syncFromEditor();
    }

    editor.addEventListener("input", syncFromEditor);
    editor.addEventListener("paste", () => setTimeout(syncFromEditor, 0));
  </script>
</body>
</html>
